<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Pokedex</title>
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
        }
    </style>
</head>
<body class="bg-gray-100">

    <header class="bg-red-600 p-6 text-center shadow-b-md">
        <h1 class="text-white text-3xl md:text-5xl">Pokedex</h1>
    </header>

    
    <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
            
            {% for pokemon in pokemons %}
            <div class="flex flex-col items-center bg-white rounded-lg p-6 shadow-xl border-4 border-red-800 transition hover:-translate-y-2 m-4">
                
                <span class="text-white text-[10px] mb-2">#{{ pokemon.numero }}</span>

                <div class="bg-black rounded-full p-4 mb-4 border-4 border-red-400">
                    <img src="{{ pokemon.foto_url }}" alt="{{ pokemon.nome }}" class="w-24 h-24 object-contain">
                </div>

                <h2 class="text-black text-xs uppercase mb-4 text-center">{{ pokemon.nome }}</h2>
                
                {% for t in pokemon.tipos.all %}
                    <span class="text-[8px] px-3 py-1 rounded-full font-bold uppercase text-black shadow-md border border-black/20
                        {% if t.nome == 'grass' %} bg-green-500
                        {% elif t.nome == 'fire' %} bg-red-500
                        {% elif t.nome == 'water' %} bg-blue-500
                        {% elif t.nome == 'bug' %} bg-lime-600
                        {% elif t.nome == 'normal' %} bg-stone-400
                        {% elif t.nome == 'poison' %} bg-purple-500
                        {% elif t.nome == 'electric' %} bg-yellow-400
                        {% elif t.nome == 'ground' %} bg-amber-600
                        {% elif t.nome == 'fairy' %} bg-pink-300
                        {% elif t.nome == 'fighting' %} bg-orange-700
                        {% elif t.nome == 'psychic' %} bg-rose-400
                        {% elif t.nome == 'rock' %} bg-stone-600
                        {% elif t.nome == 'steel' %} bg-slate-400
                        {% elif t.nome == 'ice' %} bg-cyan-200
                        {% elif t.nome == 'ghost' %} bg-indigo-700
                        {% elif t.nome == 'dragon' %} bg-violet-600
                        {% elif t.nome == 'flying' %} bg-sky-400
                        {% else %} bg-slate-500 {% endif %}">
                        {{ t.nome }}
                    </span>
                    {% endfor %}

                <h2 class="text-black text-xs uppercase mb-4 text-center p-3">{{ pokemon.descricao }}</h2>

            </div>
            {% endfor %}
        </div>
    </div>
    
</body>
</html>
